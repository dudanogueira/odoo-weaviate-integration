[options]
; Odoo server configuration for Docker Compose development stack.

; Database
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
db_name = odoo

; Addons
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

; Logging
log_level = info

; Workers (0 = single-threaded, fine for development)
workers = 0

; Long polling
longpolling_port = 8072

; Misc
list_db = True
proxy_mode = False
without_demo = all
